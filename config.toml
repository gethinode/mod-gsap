[module]
  [module.hugoVersion]
    extended = true
    min = "0.110.0"
    max = ""
  [[module.mounts]]
    source = "dist/gsap.js"
    target = "assets/js/modules/gsap/_core/gsap.js"
  [[module.mounts]]
    source = "dist/ScrollTrigger.js"
    target = "assets/js/modules/gsap/_core/ScrollTrigger.js"
  [[module.mounts]]
    source = "dist/SplitText.js"
    target = "assets/js/modules/gsap/_core/SplitText.js"
  [[module.mounts]]
    source = 'layouts'
    target = 'layouts'
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    source = 'static'
    target = 'static'

[params.modules.gsap]
  integration = "core"
  state = "defer"
  # GSAP's UMD builds do not self-register on window when bundled by
  # esbuild; expose them explicitly so Hinode's scripts pipeline (and
  # consumer animation code using bare globals) can resolve them.
  [[params.modules.gsap.globals]]
    path = "js/modules/gsap/_core/gsap.js"
    name = "gsap"
  [[params.modules.gsap.globals]]
    path = "js/modules/gsap/_core/ScrollTrigger.js"
    name = "ScrollTrigger"
  [[params.modules.gsap.globals]]
    path = "js/modules/gsap/_core/SplitText.js"
    name = "SplitText"
